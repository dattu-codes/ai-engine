version: '3.8'

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile.prod
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/ai_engine
      - REDIS_URL=redis://redis:6379/0
      - APP_ENVIRONMENT=production
      - JWT_SECRET=47a329ef3118cf94a0d923bc650630ba5239a04a5cf2b07e5cba4839de848aef
    depends_on:
      - db
      - redis
    volumes:
      - upload_data:/app/app/temp_clones

  worker:
    build:
      context: .
      dockerfile: Dockerfile.prod
    command: ["python", "-m", "app.worker"]
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/ai_engine
      - REDIS_URL=redis://redis:6379/0
      - APP_ENVIRONMENT=production
    depends_on:
      - db
      - redis
    volumes:
      - upload_data:/app/app/temp_clones

  db:
    image: postgres:15-alpine
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=ai_engine
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - api

volumes:
  postgres_data:
  upload_data:
